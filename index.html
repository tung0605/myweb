<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CareFlow - Đặt lịch khám trực tuyến</title>
<style>
:root{--navy:#0e2b53;--teal:#12a39a;--bg:#eef4f5;--card:#fff;--line:#d8e5e6;--txt:#15324f;--muted:#6d8296;--red:#ef4444;--green:#16a34a;--blue:#315ef1;--shadow:0 14px 34px rgba(15,38,70,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--txt)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hide{display:none!important}.auth{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}.authLeft{background:linear-gradient(135deg,#102c57,#0f6f7d,#14a69c);color:#fff;padding:52px;position:relative;overflow:hidden}.authLeft:after{content:"";position:absolute;right:-80px;top:-80px;width:360px;height:360px;border-radius:50%;background:#ffffff22}.brand{display:flex;gap:14px;align-items:center;font-weight:900;font-size:30px}.mark{width:54px;height:54px;border-radius:18px;background:#ffffff22;display:grid;place-items:center}.authLeft h1{font-size:64px;line-height:1.08;letter-spacing:-.06em;margin:120px 0 20px}.authLeft p{font-size:22px;line-height:1.6;color:#c7fff7}.authRight{display:grid;place-items:center;padding:60px;background:#f2f7f7}.box{width:min(620px,100%)}h2{margin:0 0 8px;font-size:40px;letter-spacing:-.04em}.muted{color:var(--muted)}.tabs{display:flex;gap:8px;background:#e8efef;padding:6px;border-radius:24px;margin:28px 0}.tabs button{flex:1;border:0;background:transparent;border-radius:18px;padding:15px;font-weight:800;color:#687c91}.tabs .on{background:#fff;color:#0d8b85;box-shadow:0 8px 18px #10204018}.field{display:block;margin:14px 0}.field b{display:block;margin-bottom:8px}.field input,.field select,.field textarea{width:100%;height:58px;border:1.5px solid #cfe0e2;border-radius:20px;padding:0 16px;background:#fff;outline:0}.field textarea{height:95px;padding-top:14px}.btn{border:0;border-radius:18px;padding:13px 18px;font-weight:900}.primary{background:linear-gradient(135deg,#12a39a,#1799bd);color:#fff}.light{background:#f4f8f8;border:1px solid var(--line);color:#52697d}.red{background:#fee2e2;color:#dc2626}.green{background:#dcfce7;color:#15803d}.pay{background:#ede9fe;color:#7c3aed}.full{width:100%;height:62px;font-size:20px}.suggest{display:none;background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:6px}.suggest div{padding:12px;cursor:pointer}.suggest div:hover{background:#f2f7f7}.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}.side{background:var(--navy);color:#fff;padding:24px;display:flex;flex-direction:column}.side .logo{display:flex;gap:12px;align-items:center;border-bottom:1px solid #ffffff15;padding-bottom:20px}.side .heart{width:46px;height:46px;border-radius:16px;background:#12c7bd;display:grid;place-items:center}.user{margin:22px 0;background:#173d70;border-radius:22px;padding:16px;display:flex;gap:12px;align-items:center}.av{width:42px;height:42px;border-radius:50%;background:#22d3c5;display:grid;place-items:center;font-weight:900}.menu{display:grid;gap:6px}.menu button{border:0;background:transparent;color:#c8d7e8;border-radius:18px;text-align:left;padding:16px;font-weight:800;font-size:16px}.menu .on,.menu button:hover{background:#15a59b;color:#fff}.logout{margin-top:auto;border-top:1px solid #ffffff15;padding-top:18px}.mainWrap{min-width:0}.top{height:88px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:5}.search{width:min(620px,60%);height:54px;border:1.5px solid #cbe0e2;background:#f2f7f7;border-radius:999px;padding:0 20px}.main{padding:28px}.screen{display:none}.screen.on{display:block}.hero{background:linear-gradient(135deg,#10335f,#0d7086,#1aa59d);border-radius:28px;color:#fff;padding:30px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-30px;top:-30px;width:170px;height:170px;border-radius:50%;background:#ffffff22}.hero h1{font-size:48px;margin:8px 0;letter-spacing:-.05em}.grid{display:grid;gap:18px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}.card{background:#fff;border:1px solid var(--line);border-radius:26px;padding:20px;box-shadow:0 8px 22px #10204008}.statNum{font-size:42px;font-weight:950}.ico{width:48px;height:48px;border-radius:18px;background:#d6f5f1;display:grid;place-items:center;margin-bottom:12px}.head{display:flex;align-items:center;justify-content:space-between;margin:22px 0 14px}.appt{background:#fff;border:1px solid var(--line);border-radius:22px;padding:18px;display:flex;justify-content:space-between;gap:15px;margin-bottom:14px}.appt h3{margin:0 0 6px}.badge{display:inline-flex;border-radius:999px;padding:9px 13px;font-weight:900;font-size:13px}.wait{background:#d9f5f2;color:#0e9a91}.assign{background:#dbe9ff;color:#315ef1}.ok{background:#dcfce7;color:#15803d}.reject{background:#fee2e2;color:#dc2626}.paid{background:#ede9fe;color:#7c3aed}.cancel{background:#e2e8f0;color:#475569}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.article{padding:0;overflow:hidden}.article .img{height:150px;background-size:cover;background-position:center}.article .body{padding:18px}.cat{display:inline-block;background:#e8f9f6;color:#0b9b91;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:900}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.span2{grid-column:1/-1}.table{overflow:auto;background:#fff;border:1px solid var(--line);border-radius:22px}table{width:100%;min-width:850px;border-collapse:collapse}th,td{padding:13px;border-bottom:1px solid #e7efef;text-align:left}th{background:#f6f9f9;color:#6d8296}.modalBg{position:fixed;inset:0;background:#0a1c34aa;display:none;align-items:center;justify-content:center;padding:16px;z-index:30}.modalBg.on{display:flex}.modal{background:#fff;border-radius:26px;padding:24px;width:min(700px,100%);max-height:90vh;overflow:auto}.toast{position:fixed;right:16px;top:16px;background:#10b981;color:#fff;border-radius:16px;padding:14px 18px;font-weight:900;z-index:50}.bottom{display:none}@media(max-width:900px){.auth{grid-template-columns:1fr}.authLeft{padding:25px;min-height:330px}.authLeft h1{font-size:42px;margin:45px 0 14px}.authRight{padding:24px}.app{grid-template-columns:1fr}.side{display:none}.top{height:auto;gap:12px;flex-wrap:wrap;padding:14px}.search{width:100%}.main{padding:16px 16px 90px}.g4,.g3,.g2,.form{grid-template-columns:1fr}.appt{flex-direction:column}.bottom{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:9px 8px calc(9px + env(safe-area-inset-bottom));z-index:20}.bottom button{border:0;background:transparent;color:#71859a;font-weight:800;font-size:12px}.bottom .on{color:#0d9e95}.hero h1{font-size:35px}}
</style>
</head>
<body><div id="root"></div><div class="modalBg" id="mb"><div class="modal" id="modal"></div></div><script>
const doctors=[['d1','BS. Phạm Thị Lan','Tim mạch'],['d2','BS. Nguyễn Thu Hà','Da liễu'],['d3','BS. Trần Minh Anh','Nội tổng hợp'],['d4','BS. Lê Quốc Tùng','Tai Mũi Họng']];
const specs=['Tim mạch','Da liễu','Nội tổng hợp','Tai Mũi Họng','Khám sức khỏe định kỳ'];
const arts=[['a1','Tin tức dịch bệnh','Cách phòng tránh bệnh theo mùa','Những lưu ý giúp bảo vệ sức khỏe khi giao mùa.','https://images.unsplash.com/photo-1498837167922-ddd27525d352?q=80&w=1000&auto=format&fit=crop'],['a2','Cẩm nang sức khỏe','5 dấu hiệu nên đi khám sớm','Đừng chủ quan khi cơ thể có triệu chứng bất thường.','https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=1000&auto=format&fit=crop'],['a3','Dinh dưỡng','Chế độ ăn lành mạnh cho người bận rộn','Gợi ý thực đơn đơn giản nhưng đủ dưỡng chất.','https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1000&auto=format&fit=crop'],['a4','Vận động','Tập thể dục đúng cách để bảo vệ tim mạch','Bài tập nhẹ phù hợp với người làm văn phòng.','https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1000&auto=format&fit=crop']];
let db=JSON.parse(localStorage.careflow||'null')||{u:null,page:'home',users:[{id:'u1',role:'patient',name:'Nguyễn Thị Hoa',phone:'0901234567',email:'hoa@email.com',pass:'123456'},{id:'u2',role:'admin',name:'Quản trị viên',phone:'admin',email:'admin@care.vn',pass:'admin123'},{id:'u3',role:'doctor',name:'BS. Phạm Thị Lan',phone:'doctor',email:'doctor@care.vn',pass:'doctor123',doctor:'d1'}],apps:[{id:'LH1001',pid:'u1',name:'Nguyễn Thị Hoa',date:'2026-07-15',time:'09:30',spec:'Tim mạch',reason:'Đau ngực, khó thở',doc:'d1',docName:'BS. Phạm Thị Lan',status:'Đã xác nhận',pay:'Chưa thanh toán',price:300000},{id:'LH1002',pid:'u1',name:'Nguyễn Thị Hoa',date:'2026-07-22',time:'15:00',spec:'Nội tổng hợp',reason:'Khám tổng quát định kỳ',doc:'',docName:'Chưa phân công',status:'Chờ xử lý',pay:'Chưa thanh toán',price:200000}],noti:[{uid:'u1',title:'Bạn có lịch khám vào ngày mai',body:'Lịch Tim mạch lúc 09:30 ngày 15/07/2026.',read:false}],records:[{uid:'u1',title:'Khám Nội tổng hợp',date:'2026-06-08',doctor:'BS. Trần Minh Anh',result:'Viêm họng nhẹ, tình trạng ổn định.'}]};
function save(){localStorage.careflow=JSON.stringify(db)}function u(){return db.users.find(x=>x.id==db.u)}function ini(n){return n.split(' ').map(x=>x[0]).slice(-2).join('').toUpperCase()}function money(n){return Number(n).toLocaleString('vi-VN')+'đ'}function cls(s){return s=='Chờ xử lý'?'wait':s=='Đã phân công'?'assign':s=='Đã xác nhận'?'ok':s=='Đã từ chối'?'reject':s=='Đã thanh toán'?'paid':'cancel'}function t(m){let e=document.createElement('div');e.className='toast';e.innerText=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2200)}function modal(h){modal.innerHTML=h;mb.classList.add('on')}function closeM(){mb.classList.remove('on')}mb.onclick=e=>{if(e.target.id=='mb')closeM()}
function render(){if(!db.u)return auth();root.innerHTML=`<div class="app"><aside class="side"><div class="logo"><div class="heart">♡</div><div><b>CareFlow</b><br><span style="color:#42d8cb">Đặt lịch khám trực tuyến</span></div></div><div class="user"><div class="av">${ini(u().name)}</div><div><b>${u().name}</b><br><span style="color:#9fe5df">${roleName(u().role)}</span></div></div><div class="menu">${menu().map(x=>`<button class="${db.page==x[0]?'on':''}" onclick="go('${x[0]}')">${x[1]} ${x[2]}</button>`).join('')}</div><div class="logout"><button onclick="db.u=null;save();render()">Đăng xuất</button></div></aside><main class="mainWrap"><div class="top"><input class="search" placeholder="Tìm kiếm bác sĩ, chuyên khoa, bài viết..."><div><button class="btn light">🔔</button> <button class="btn light">${ini(u().name)} ${u().name.split(' ').pop()}</button></div></div><div class="main">${page()}</div></main></div><div class="bottom">${menu().slice(0,5).map(x=>`<button class="${db.page==x[0]?'on':''}" onclick="go('${x[0]}')">${x[1]}<br>${x[2].split(' ')[0]}</button>`).join('')}</div>`}
function roleName(r){return r=='patient'?'Bệnh nhân':r=='admin'?'Admin':'Bác sĩ'}function menu(){return u().role=='patient'?[['home','🏠','Trang chủ'],['book','📅','Đặt lịch khám'],['apps','📋','Lịch hẹn của tôi'],['articles','📚','Bài viết sức khỏe'],['record','📄','Hồ sơ bệnh án'],['noti','🔔','Thông báo'],['profile','👤','Hồ sơ cá nhân']]:u().role=='admin'?[['admin','📋','Yêu cầu đặt lịch'],['doctor','🩺','Bác sĩ & lịch làm việc'],['send','🔔','Gửi thông báo']]:[['docapps','🗓️','Lịch khám của tôi'],['noti','🔔','Thông báo']]}
function go(p){db.page=p;save();render()}
function auth(){root.innerHTML=`<div class="auth"><div class="authLeft"><div class="brand"><div class="mark">♡</div>CareFlow</div><h1>Chăm sóc sức khỏe<br>của bạn là<br>ưu tiên hàng đầu</h1><p>Hệ thống đặt lịch khám trực tuyến tiện lợi, nhanh chóng. Kết nối bệnh nhân với đội ngũ bác sĩ tận tâm.</p></div><div class="authRight"><div class="box"><h2 id="ttl">Đăng nhập hệ thống</h2><p class="muted">Chọn vai trò và đăng nhập để tiếp tục</p><div class="tabs"><button class="on" onclick="role='patient';fill()">Bệnh nhân</button><button onclick="role='admin';fill()">Admin</button><button onclick="role='doctor';fill()">Bác sĩ</button></div><div id="form"></div></div></div></div>`;role='patient';fill()}
function fill(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('on'));let i=role=='patient'?0:role=='admin'?1:2;document.querySelectorAll('.tabs button')[i].classList.add('on');form.innerHTML=`<label class="field"><b>Tài khoản / số điện thoại</b><input id="lg" value="${role=='patient'?'0901234567':role=='admin'?'admin':'doctor'}"></label><label class="field"><b>Mật khẩu</b><input id="pw" type="password" value="${role=='patient'?'123456':role=='admin'?'admin123':'doctor123'}"></label><button class="btn primary full" onclick="login()">Đăng nhập</button><p style="text-align:center" class="muted">Chưa có tài khoản? <a onclick="regForm()" style="color:#0e9f96;font-weight:900">Đăng ký ngay</a></p>`}
function regForm(){ttl.innerText='Đăng ký tài khoản';form.innerHTML=`<label class="field"><b>Họ tên</b><input id="rn"></label><label class="field"><b>Số điện thoại</b><input id="rp"></label><label class="field"><b>Email</b><input id="re" oninput="sg.classList.toggle('hide',this.value.toLowerCase()!='h')"><div id="sg" class="suggest hide"><div onclick="re.value='hoa@email.com';sg.classList.add('hide')">hoa@email.com</div></div></label><label class="field"><b>Mật khẩu</b><input id="rpass" type="password"></label><button class="btn primary full" onclick="reg()">Đăng ký</button><p style="text-align:center"><a onclick="auth()">Quay lại đăng nhập</a></p>`}
function login(){let x=db.users.find(a=>a.role==role&&(a.phone==lg.value||a.email==lg.value)&&a.pass==pw.value);if(!x)return t('Sai thông tin đăng nhập');db.u=x.id;db.page=x.role=='patient'?'home':x.role=='admin'?'admin':'docapps';save();render()}function reg(){if(!rn.value||!rp.value||!re.value||!rpass.value)return t('Nhập đủ thông tin');db.users.push({id:'u'+Date.now(),role:'patient',name:rn.value,phone:rp.value,email:re.value,pass:rpass.value});save();modal('<h2>Đăng ký thành công</h2><p>Bạn có thể đăng nhập để sử dụng hệ thống.</p><button class="btn primary" onclick="closeM();auth()">Đăng nhập</button>')}
function page(){let r=u().role;if(r=='patient')return patientPage();if(r=='admin')return adminPage();return doctorPage()}function patientPage(){if(db.page=='book')return book();if(db.page=='apps')return appsP();if(db.page=='articles')return articles();if(db.page=='record')return records();if(db.page=='noti')return noti();if(db.page=='profile')return profile();let a=db.apps.filter(x=>x.pid==u().id);return `<div class="hero"><p>Chào mừng trở lại,</p><h1>${u().name}</h1><p>Hôm nay bạn cảm thấy thế nào?</p><button class="btn primary" onclick="go('book')">＋ Đặt lịch khám ngay</button></div><div class="grid g4" style="margin-top:24px"><div class="card"><div class="ico">📅</div><div class="statNum">${a.length}</div><div class="muted">Lịch hẹn sắp tới</div></div><div class="card"><div class="ico">✔️</div><div class="statNum">8</div><div class="muted">Đã hoàn thành</div></div><div class="card"><div class="ico">🔔</div><div class="statNum">${db.noti.filter(n=>n.uid==u().id&&!n.read).length}</div><div class="muted">Thông báo mới</div></div><div class="card"><div class="ico">📄</div><div class="statNum">${db.records.length}</div><div class="muted">Hồ sơ bệnh án</div></div></div><div class="head"><h2>Lịch hẹn sắp tới</h2><a onclick="go('apps')">Xem tất cả</a></div>${a.slice(0,1).map(cardP).join('')}<div class="head"><h2>Đặt lịch theo chuyên khoa</h2></div><div class="grid g3">${specs.map(s=>`<div class="card"><h3>🏥 ${s}</h3><p class="muted">Chọn lịch khám phù hợp</p></div>`).join('')}</div>`}
function book(){return `<div class="head"><h2>Đặt lịch khám</h2></div><div class="card"><div class="form"><label class="field"><b>Họ tên</b><input id="bn" value="${u().name}"></label><label class="field"><b>Số điện thoại</b><input value="${u().phone||''}"></label><label class="field"><b>Chuyên khoa</b><select id="bspec">${specs.map(s=>`<option>${s}</option>`)}</select></label><label class="field"><b>Ngày khám</b><input id="bd" type="date" value="2026-07-25"></label><label class="field"><b>Giờ khám</b><select id="bt"><option>08:30</option><option>09:30</option><option>14:00</option></select></label><label class="field"><b>Chi phí</b><input value="300000" readonly></label><label class="field span2"><b>Lý do khám</b><textarea id="br" placeholder="Nhập tình trạng"></textarea></label></div><br><button class="btn primary" onclick="bookNow()">Xác nhận đặt lịch</button></div>`}
function bookNow(){let a={id:'LH'+Math.floor(Math.random()*9000+1000),pid:u().id,name:bn.value,date:bd.value,time:bt.value,spec:bspec.value,reason:br.value||'Khám theo nhu cầu',doc:'',docName:'Chưa phân công',status:'Chờ xử lý',pay:'Chưa thanh toán',price:300000};db.apps.unshift(a);db.noti.unshift({uid:u().id,title:'Đặt lịch thành công',body:'Lịch '+a.id+' đã được tạo.',read:false});db.page='apps';save();render();t('Đặt lịch thành công')}
function cardP(a){return `<div class="appt"><div><h3>${a.docName}</h3><p class="muted">${a.spec} • ${a.date} lúc ${a.time}<br>${a.reason}<br>Thanh toán: <b>${a.pay}</b></p></div><div><span class="badge ${cls(a.status)}">${a.status}</span><div class="actions"><button class="btn light" onclick="detail('${a.id}')">Chi tiết</button>${a.pay=='Chưa thanh toán'?`<button class="btn pay" onclick="pay('${a.id}')">Thanh toán</button>`:''}<button class="btn red" onclick="cancel('${a.id}')">Hủy</button></div></div></div>`}
function appsP(){let a=db.apps.filter(x=>x.pid==u().id);return `<div class="head"><h2>Lịch hẹn của tôi</h2></div>${a.map(cardP).join('')}`}
function articles(){return `<div class="head"><h2>Bài viết sức khỏe</h2></div><div class="grid g3">${arts.map(a=>`<div class="card article"><div class="img" style="background-image:url('${a[4]}')"></div><div class="body"><span class="cat">${a[1]}</span><h3>${a[2]}</h3><p class="muted">${a[3]}</p><button class="btn primary" onclick="modal('<h2>${a[2]}</h2><p>${a[3]}</p><button class=\'btn light\' onclick=\'closeM()\'>Đóng</button>')">Xem chi tiết</button></div></div>`).join('')}</div>`}
function records(){return `<div class="head"><h2>Hồ sơ bệnh án</h2></div><div class="card">${db.records.map(r=>`<div class="card"><b>${r.title}</b><p class="muted">${r.date} • ${r.doctor}<br>${r.result}</p></div>`).join('')}</div>`}function noti(){return `<div class="head"><h2>Thông báo</h2></div>${db.noti.filter(n=>n.uid==u().id).map(n=>`<div class="card"><h3>${n.title}</h3><p class="muted">${n.body}</p></div>`).join('')||'<div class="card">Chưa có thông báo</div>'}`}
function profile(){return `<div class="head"><h2>Hồ sơ cá nhân</h2></div><div class="card"><div class="form"><label class="field"><b>Họ tên</b><input id="pn" value="${u().name}"></label><label class="field"><b>Email</b><input id="pe" value="${u().email||''}"></label><label class="field"><b>Số điện thoại</b><input id="pp" value="${u().phone||''}"></label><label class="field"><b>Địa chỉ</b><input id="pa" value="${u().address||''}"></label></div><br><button class="btn primary" onclick="u().name=pn.value;u().email=pe.value;u().phone=pp.value;u().address=pa.value;save();render();t('Cập nhật hồ sơ thành công')">Lưu thay đổi</button></div>`}
function adminPage(){if(db.page=='doctor')return `<div class="head"><h2>Bác sĩ & lịch làm việc</h2></div><div class="grid g2">${doctors.map(d=>`<div class="card"><h3>${d[1]}</h3><p class="muted">${d[2]} • Có lịch làm việc</p></div>`).join('')}</div>`;if(db.page=='send')return `<div class="head"><h2>Gửi thông báo cho bệnh nhân</h2></div><div class="card"><label class="field"><b>Bệnh nhân</b><select id="nu">${db.users.filter(x=>x.role=='patient').map(x=>`<option value="${x.id}">${x.name}</option>`)}</select></label><label class="field"><b>Tiêu đề</b><input id="nt"></label><label class="field"><b>Nội dung</b><textarea id="nb"></textarea></label><button class="btn primary" onclick="db.noti.unshift({uid:nu.value,title:nt.value,body:nb.value,read:false});save();t('Đã gửi thông báo')">Gửi</button></div>`;return `<div class="head"><h2>Yêu cầu đặt lịch</h2></div><div class="table"><table><tr><th>Mã</th><th>Bệnh nhân</th><th>Lịch</th><th>Bác sĩ</th><th>Trạng thái</th><th>Xử lý</th></tr>${db.apps.map(a=>`<tr><td>${a.id}</td><td>${a.name}</td><td>${a.spec}<br>${a.date} ${a.time}</td><td>${a.docName}</td><td><span class="badge ${cls(a.status)}">${a.status}</span></td><td><button class="btn light" onclick="assign('${a.id}')">Phân công</button> <button class="btn green" onclick="approve('${a.id}')">Phê duyệt</button> <button class="btn red" onclick="reject('${a.id}')">Từ chối</button></td></tr>`).join('')}</table></div>`}
function doctorPage(){let list=db.apps.filter(a=>a.doc==u().doctor);return `<div class="head"><h2>Lịch khám của tôi</h2></div>${list.map(a=>`<div class="appt"><div><h3>${a.name}</h3><p class="muted">${a.spec} • ${a.date} lúc ${a.time}<br>${a.reason}</p></div><span class="badge ${cls(a.status)}">${a.status}</span></div>`).join('')||'<div class="card">Chưa có lịch khám được phân công.</div>'}`}
function detail(id){let a=db.apps.find(x=>x.id==id);modal(`<h2>Chi tiết lịch hẹn</h2><p><b>${a.id}</b> • ${a.name}</p><p>${a.spec} • ${a.date} ${a.time}</p><p>Bác sĩ: ${a.docName}</p><p>Trạng thái: ${a.status}</p><p>Thanh toán: ${a.pay} - ${money(a.price)}</p><button class="btn light" onclick="closeM()">Đóng</button>`)}function pay(id){let a=db.apps.find(x=>x.id==id);a.pay='Đã thanh toán';db.noti.unshift({uid:a.pid,title:'Thanh toán thành công',body:'Bạn đã thanh toán '+money(a.price)+' cho lịch '+a.id,read:false});save();render();t('Thanh toán thành công')}function cancel(id){let a=db.apps.find(x=>x.id==id);a.status='Đã hủy';save();render();t('Đã hủy lịch')}
function assign(id){let a=db.apps.find(x=>x.id==id);modal(`<h2>Phân công bác sĩ</h2><label class="field"><b>Chọn bác sĩ</b><select id="ad">${doctors.map(d=>`<option value="${d[0]}">${d[1]} - ${d[2]}</option>`)}</select></label><button class="btn primary" onclick="let d=doctors.find(x=>x[0]==ad.value);let a=db.apps.find(x=>x.id=='${id}');a.doc=d[0];a.docName=d[1];a.spec=d[2];a.status='Đã phân công';db.noti.unshift({uid:a.pid,title:'Đã phân công bác sĩ',body:d[1]+' được phân công cho lịch '+a.id,read:false});save();closeM();render();t('Đã phân công bác sĩ')">Lưu</button>`)}
function approve(id){let a=db.apps.find(x=>x.id==id);if(!a.doc)return t('Cần phân công bác sĩ trước');a.status='Đã xác nhận';db.noti.unshift({uid:a.pid,title:'Lịch hẹn đã được phê duyệt',body:'Lịch '+a.id+' đã xác nhận.',read:false});save();render();t('Đã phê duyệt lịch hẹn')}function reject(id){let a=db.apps.find(x=>x.id==id);a.status='Đã từ chối';db.noti.unshift({uid:a.pid,title:'Lịch hẹn bị từ chối',body:'Lịch '+a.id+' đã bị từ chối.',read:false});save();render();t('Đã từ chối lịch hẹn')}
render();
</script></body></html>
